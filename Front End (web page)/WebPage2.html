<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Ambulance Tracking Dashboard</title>

<link rel="stylesheet" href="WebPage2Style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<!-- LEFT CONTROL PANEL -->

<div class="sidebar">

<h2>🚑 Ambulance Control</h2>

<div class="ambulance-card">

<img src="https://cdn-icons-png.flaticon.com/512/2967/2967350.png" class="ambulance-img">

<div id="ambulanceDetails"></div>

</div>

<div class="system-info">

<h3>🚦 Corridor Control</h3>

<div class="info-line">
Signals Ahead: <span id="signalCount"></span>
</div>

<div class="info-line">
Green Corridor: <span class="active">ACTIVE</span>
</div>

<div class="info-line">
Traffic Clearance: <span>IN PROGRESS</span>
</div>

<div class="info-line">
Emergency Priority: <span id="priorityLevel"></span>
</div>

</div>

</div>


<!-- MAP AREA -->

<div class="map-section">

<div class="map-header">

🚑 Route Monitoring

</div>

<div id="mapPlaceholder">

<div class="map-center">

🗺 Map API will load here

</div>

</div>

</div>

</div>

<script src="WebPage2Script.js"></script>

</body>
</html>
