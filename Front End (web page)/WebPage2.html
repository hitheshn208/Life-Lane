<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Ambulance Route Dashboard</title>

<link rel="stylesheet" href="WebPage2Style.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<div class="sidebar">

<h2>🚑 Ambulance Information</h2>

<div class="ambulance-card">

<img src="https://cdn-icons-png.flaticon.com/512/2967/2967350.png" class="ambulance-img">

<div class="info-row">
Plate Number: <span id="plate">—</span>
</div>

<div class="info-row">
Driver Name: <span id="driver">—</span>
</div>

<div class="info-row">
Patient Condition: <span id="status">—</span>
</div>

<div class="info-row">
Destination Hospital: <span id="hospital">—</span>
</div>

<div class="info-row">
Estimated Arrival: <span id="eta">—</span>
</div>

<div class="info-row">
Signals Ahead: <span id="signals">—</span>
</div>

<div class="info-row">
Priority Level: <span id="priority">—</span>
</div>

</div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="WebPage2Script.js"></script>

</body>

</html>
