<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Ambulance Route Dashboard</title>

<link rel="stylesheet" href="WebPage2Style.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<div class="sidebar">

<h2>🚑 Ambulance Information</h2>

<div class="card">

<div class="hospital-section">
<p class="label">Destination Hospital:</p>
<h2 id="hospital">—</h2>
</div>

<div class="eta-section">

<div class="eta-left">
<p class="label">Estimated Arrival:</p>
<h1 id="eta">—</h1>
<p id="remaining">—</p>
</div>

<div class="eta-gauge">
<div class="gauge-circle">
<span id="etaMinutes">--</span>
<p>remaining</p>
</div>
</div>

</div>

<div class="signals">

<p class="label">Traffic Signal Path:</p>

<div id="signalPath" class="signal-path"></div>

<p class="next-signal">
Next: <span id="nextSignal">—</span>
</p>

<div id="signalList" class="signal-list"></div>

</div>

<div class="priority">

<p class="label">Priority Level:</p>
<span id="priority">—</span>

</div>

</div>

</div>

<div id="map"></div>

<div id="routeLoader" class="route-loader">
<div class="spinner"></div>
<p id="routeLoaderText">Loading route...</p>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="WebPage2Script.js"></script>

</body>

</html>
