<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Ambulance Control Dashboard</title>

<link rel="stylesheet" href="DashBoardStyle.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<header>

<div class="header-left">

<!-- PUT YOUR LOGO IMAGE URL HERE -->
<img src="LogoBG.png" class="logo">

<h1>AMBULANCE CONTROL PANEL</h1>

</div>

<div id="connectionStatus" class="connection-status connecting">Connecting...</div>

</header>

<div class="filters">

<div class="filter-pill active" data-status="all">All</div>

<div class="filter-pill" data-status="critical">Critical</div>

<div class="filter-pill" data-status="moderate">Moderate</div>

<div class="filter-pill" data-status="stable">Stable</div>

</div>

<div class="ambulance-container" id="ambulanceContainer"></div>

<div class="empty-state" id="emptyState" hidden>
No active ambulance trips found.
</div>

<script src="DashBoardScript.js"></script>

</body>
</html>
