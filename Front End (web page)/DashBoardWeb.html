<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Ambulance Control Dashboard</title>

<link rel="stylesheet" href="DashBoardStyle.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<header>
<h1>
<span class="ambulance-svg">
<svg width="32" height="32" viewBox="0 0 24 24" fill="none">
<path d="M3 13V7a2 2 0 0 1 2-2h9l4 5v3" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
<circle cx="7.5" cy="17.5" r="2.5" stroke="#111" stroke-width="2"/>
<circle cx="17.5" cy="17.5" r="2.5" stroke="#111" stroke-width="2"/>
<path d="M13 5v4h4" stroke="#ef4444" stroke-width="2"/>
</svg>
</span>
AMBULANCE CONTROL PANEL
</h1>

<div id="connectionStatus" class="connection-status connecting">Connecting...</div>

</header>

<div class="filters">

<div class="filter-pill active" data-status="all">All</div>

<div class="filter-pill" data-status="critical">Critical</div>

<div class="filter-pill" data-status="moderate">Moderate</div>

<div class="filter-pill" data-status="stable">Stable</div>

</div>

<div class="ambulance-container" id="ambulanceContainer"></div>

<div class="empty-state" id="emptyState" hidden>
No active ambulance trips found.
</div>

<script src="DashBoardScript.js"></script>

</body>
</html>
